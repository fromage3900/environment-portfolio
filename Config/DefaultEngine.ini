[/Script/Engine.RendererSettings]
; Desktop showcase baseline. These settings are intentionally project-level so
; opening the project on a new machine cannot silently fall back from Lumen.
r.AllowStaticLighting=False
r.Shadow.Virtual.Enable=1
r.MegaLights.EnableForProject=True
r.GenerateMeshDistanceFields=True
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.SkinCache.CompileShaders=True
r.RayTracing=True
r.RayTracing.RayTracingProxies.ProjectEnabled=True
r.Substrate=True
r.Substrate.ProjectGBufferFormat=0
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True
r.DefaultFeature.LocalExposure.HighlightContrastScale=0.8
r.DefaultFeature.LocalExposure.ShadowContrastScale=0.8
; MeshBlend v2.1 targets UE 5.7. Keep its runtime pass disabled on UE 5.8.
r.MeshBlend.Enable=0

; Mobile remains a separate compatibility target. These values do not define
; the Windows showcase renderer above.
r.MobileContentScaleFactor=1.0
r.MobileHDR=False
r.MobileMSAA=2
r.MobileTonemapperFilm=0

